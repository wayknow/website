<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="48" fill="url(#bgGrad)"/>

  <!-- Subtle outer ring -->
  <circle cx="200" cy="200" r="155" fill="none" stroke="url(#brandGrad)" stroke-width="1.5" opacity="0.15"/>

  <!-- Hexagon shield -->
  <polygon
    points="200,55 330,130 330,270 200,345 70,270 70,130"
    fill="none"
    stroke="url(#brandGrad)"
    stroke-width="3"
    opacity="0.9"
    filter="url(#glow)"
  />

  <!-- Inner hexagon nodes — 6 dots at vertices -->
  <circle cx="200" cy="75" r="5" fill="#3b82f6" opacity="0.9"/>
  <circle cx="310" cy="140" r="5" fill="#3b82f6" opacity="0.9"/>
  <circle cx="310" cy="260" r="5" fill="#06b6d4" opacity="0.9"/>
  <circle cx="200" cy="325" r="5" fill="#06b6d4" opacity="0.9"/>
  <circle cx="90" cy="260" r="5" fill="#06b6d4" opacity="0.9"/>
  <circle cx="90" cy="140" r="5" fill="#3b82f6" opacity="0.9"/>

  <!-- Center dot — the "WayKnow" dot, enlarged -->
  <circle cx="200" cy="200" r="28" fill="url(#brandGrad)" filter="url(#glow)"/>

  <!-- Inner ring around center dot -->
  <circle cx="200" cy="200" r="42" fill="none" stroke="url(#brandGrad)" stroke-width="2" opacity="0.5"/>
  <circle cx="200" cy="200" r="56" fill="none" stroke="url(#brandGrad)" stroke-width="1" opacity="0.25"/>

  <!-- Connecting lines from center to vertices (subtle) -->
  <line x1="200" y1="200" x2="200" y2="80" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="200" x2="303" y2="143" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="200" x2="303" y2="257" stroke="#06b6d4" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="200" x2="200" y2="320" stroke="#06b6d4" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="200" x2="97" y2="257" stroke="#06b6d4" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="200" x2="97" y2="143" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
</svg>
